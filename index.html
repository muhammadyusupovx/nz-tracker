<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWC MAQSADLAR DAFTARI</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: white;
            --text-color: #1a365d;
            --subtitle-color: #718096;
            --input-border: #e2e8f0;
            --li-bg: #f7fafc;
            --li-text: #2d3748;
            --primary: #3182ce;
            --danger: #e53e3e;
            --success: #38a169;
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #f7fafc;
            --subtitle-color: #a0aec0;
            --input-border: #4a5568;
            --li-bg: #4a5568;
            --li-text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .app-container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 380px; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            position: relative; 
        }

        .theme-toggle { position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 20px; cursor: pointer; }
        
        h1 { color: var(--text-color); font-size: 22px; text-align: center; margin-bottom: 5px; padding-top: 15px; font-weight: 800; letter-spacing: 0.5px; }
        p.subtitle { text-align: center; color: var(--subtitle-color); font-size: 13px; margin-bottom: 10px; font-weight: 500; }
        
        /* Quote Box */
        .quote-box { background: rgba(49, 130, 206, 0.08); padding: 10px; border-radius: 10px; text-align: center; font-size: 11px; font-style: italic; color: var(--primary); margin-bottom: 15px; font-weight: 600; min-height: 34px; display: flex; align-items: center; justify-content: center; }

        /* Progress Bar */
        .progress-container { background: var(--input-border); border-radius: 10px; height: 8px; width: 100%; margin-bottom: 8px; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: width 0.4s ease; }
        .progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--subtitle-color); margin-bottom: 20px; font-weight: bold; }
        .clear-btn { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 12px; font-weight: bold; }

        /* Search Box */
        .search-box { width: 100%; margin-bottom: 15px; }
        .search-box input { padding: 10px 15px; font-size: 14px; border-radius: 12px; border: 2px dashed var(--input-border); }

        /* Input Section */
        .input-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 100%; }
        .row-inputs { display: flex; gap: 8px; }
        .row-inputs select { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--input-border); background: var(--card-bg); color: var(--li-text); font-size: 14px; outline: none; font-weight: 600; }
        input { width: 100%; padding: 14px; border: 2px solid var(--input-border); background: var(--card-bg); color: var(--li-text); border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(49, 130, 206, 0.2); }
        
        button.primary-btn { 
            background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: bold; width: 100%;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3); transition: 0.2s;
        }
        button.primary-btn:active { transform: scale(0.97); }
        
        /* Filter Tabs */
        .filter-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .filter-btn { flex: 1; padding: 8px; border: none; background: var(--input-border); color: var(--subtitle-color); border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 4px; }
        .filter-btn.active { background: var(--primary); color: white; }
        .count-badge { background: rgba(0,0,0,0.1); padding: 1px 5px; border-radius: 20px; font-size: 10px; }
        .filter-btn.active .count-badge { background: rgba(255,255,255,0.2); color: white; }

        ul { list-style: none; max-height: 260px; overflow-y: auto; }
        ul::-webkit-scrollbar { width: 4px; }
        ul::-webkit-scrollbar-thumb { background: var(--input-border); border-radius: 10px; }

        /* List Items */
        li { background: var(--li-bg); padding: 14px 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); cursor: pointer; animation: fadeIn 0.3s ease; }
        
        li.p-high { border-left-color: var(--danger); }
        li.p-medium { border-left-color: #ecc94b; }
        li.p-low { border-left-color: var(--primary); }

        li.completed { border-left-color: var(--success) !important; background: rgba(56, 161, 105, 0.1); opacity: 0.6; transform: scale(0.99); }
        li.completed .text { text-decoration: line-through; color: var(--subtitle-color); }
        
        .text-group { flex: 1; display: flex; flex-direction: column; gap: 4px; margin-right: 10px; }
        .text { font-size: 14px; color: var(--li-text); word-break: break-all; font-weight: 500; }
        .badges { display: flex; gap: 5px; align-items: center; }
        .badge { font-size: 9px; background: var(--input-border); color: var(--subtitle-color); padding: 2px 6px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .badge.p-tag { background: rgba(229, 62, 62, 0.1); color: var(--danger); }

        button.delete-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; white-space: nowrap; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>CWC MAQSADLAR DAFTARI</h1>
    <p class="subtitle">3-Year Strategic Tracker</p>

    <div class="quote-box" id="quoteBox">"Loading inspiration..."</div>

    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-row">
        <span id="progressText">0% Completed</span>
        <button class="clear-btn" onclick="clearCompleted()">Clear Done</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" oninput="displayGoals()" placeholder="Search goals...">
    </div>

    <div class="input-section">
        <input type="text" id="goalInput" placeholder="Add a new strategic goal...">
        <div class="row-inputs">
            <select id="categoryInput">
                <option value="it">IT 💻</option>
                <option value="ielts">IELTS 📚</option>
                <option value="personal">Personal 🌱</option>
            </select>
            <select id="priorityInput">
                <option value="low">Priority: Low</option>
                <option value="medium">Priority: Medium</option>
                <option value="high">Priority: High 🔥</option>
            </select>
        </div>
        <button class="primary-btn" onclick="addGoal()">Add to Journey</button>
    </div>

    <div class="filter-tabs">
        <button class="filter-btn active" id="tab-all" onclick="filterGoals('all')">All <span class="count-badge" id="cnt-all">0</span></button>
        <button class="filter-btn" id="tab-it" onclick="filterGoals('it')">IT <span class="count-badge" id="cnt-it">0</span></button>
        <button class="filter-btn" id="tab-ielts" onclick="filterGoals('ielts')">IELTS <span class="count-badge" id="cnt-ielts">0</span></button>
    </div>

    <ul id="goalList"></ul>
</div>

<script>
    let currentFilter = 'all';
    
    const quotes = [
        "Success is s journey, not a destination. Keep coding!",
        "Your 3-year plan starts with what you do today.",
        "IELTS 8.0 is not a dream, it is a plan.",
        "Consistency beats talent. Never stop learning.",
        "Code your future, design your life.",
        "Small daily improvements over time lead to stunning results."
    ];

    document.addEventListener("DOMContentLoaded", () => {
        displayGoals();
        loadTheme();
        updateQuote();
    });

    function updateQuote() {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById("quoteBox").innerText = `"${randomQuote}"`;
    }

    function addGoal() {
        let input = document.getElementById("goalInput");
        let categorySelect = document.getElementById("categoryInput");
        let prioritySelect = document.getElementById("priorityInput");
        
        let goalText = input.value.trim();
        let category = categorySelect.value;
        let priority = prioritySelect.value;
        
        if (goalText === "") {
            alert("Please enter a goal!");
            return;
        }

        let goals = getGoalsFromStorage();
        goals.push({ text: goalText, completed: false, category: category, priority: priority });
        localStorage.setItem("nz_goals", JSON.stringify(goals));

        input.value = "";
        updateQuote();
        displayGoals();
    }

    function displayGoals() {
        let list = document.getElementById("goalList");
        list.innerHTML = "";
        let goals = getGoalsFromStorage();
        let searchQuery = document.getElementById("searchInput").value.toLowerCase();

        // Count Badges Update
        document.getElementById("cnt-all").innerText = goals.length;
        document.getElementById("cnt-it").innerText = goals.filter(g => g.category === 'it').length;
        document.getElementById("cnt-ielts").innerText = goals.filter(g => g.category === 'ielts').length;

        // Progress Calculation
        let total = goals.length;
        let completedCount = goals.filter(g => g.completed).length;
        let percent = total > 0 ? Math.round((completedCount / total) * 100) : 0;
        
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("progressText").innerText = `${percent}% Completed (${completedCount}/${total})`;

        // Filter and Search combined
        let filteredGoals = goals.filter(goal => {
            let matchesFilter = currentFilter === 'all' || goal.category === currentFilter;
            let matchesSearch = goal.text.toLowerCase().includes(searchQuery);
            return matchesFilter && matchesSearch;
        });

        filteredGoals.forEach((goal) => {
            let realIndex = goals.findIndex(g => g.text === goal.text && g.category === goal.category && g.priority === goal.priority);

            let li = document.createElement("li");
            li.classList.add(`p-${goal.priority}`);
            if (goal.completed) li.classList.add("completed");

            li.setAttribute("onclick", `toggleGoal(${realIndex}, event)`);

            let priorityText = goal.priority === 'high' ? '🔥' : (goal.priority === 'medium' ? '⏳' : '✅');

            li.innerHTML = `
                <div class="text-group">
                    <div class="badges">
                        <span class="badge">${goal.category}</span>
                        <span class="badge p-tag">${priorityText}</span>
                    </div>
                    <span class="text">${goal.text}</span>
                </div>
                <button class="delete-btn" onclick="deleteGoal(${realIndex}, event)">Delete</button>
            `;
            list.appendChild(li);
        });
    }

    function toggleGoal(index, event) {
        if (event.target.tagName === 'BUTTON') return;
        let goals = getGoalsFromStorage();
        goals[index].completed = !goals[index].completed;
        localStorage.setItem("nz_goals", JSON.stringify(goals));
        displayGoals();
    }

    function deleteGoal(index, event) {
        event.stopPropagation();
        let goals = getGoalsFromStorage();
        goals.splice(index, 1);
        localStorage.setItem("nz_goals", JSON.stringify(goals));
        displayGoals();
    }

    function clearCompleted() {
        let goals = getGoalsFromStorage();
        let activeGoals = goals.filter(g => !g.completed);
        localStorage.setItem("nz_goals", JSON.stringify(activeGoals));
        displayGoals();
    }

    function filterGoals(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        displayGoals();
    }

    function getGoalsFromStorage() {
        let goals = localStorage.getItem("nz_goals");
        return goals ? JSON.parse(goals) : [];
    }

    function toggleTheme() {
        let currentTheme = document.documentElement.getAttribute("data-theme");
        let targetTheme = currentTheme === "dark" ? "light" : "dark";
        let toggleBtn = document.querySelector(".theme-toggle");
        toggleBtn.innerText = targetTheme === "dark" ? "☀️" : "🌙";
        document.documentElement.setAttribute("data-theme", targetTheme);
        localStorage.setItem("nz_theme", targetTheme);
    }

    function loadTheme() {
        let savedTheme = localStorage.getItem("nz_theme");
        if (savedTheme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            document.querySelector(".theme-toggle").innerText = "☀️";
        }
    }
</script>

</body>
</html>
